{% extends "base.html" %}
{% block content %}
<h1>{% if branch %}Upravit pobočku{% else %}Přidat pobočku{% endif %}</h1>
<form method="post">
    <div class="row">
        <label for="name">Název pobočky *</label>
        <input type="text" id="name" name="name" value="{{ branch.name if branch else '' }}" required maxlength="100">
    </div>
    <div class="row">
        <label for="code">Kód (volitelné)</label>
        <input type="text" id="code" name="code" value="{{ branch.code if branch else '' }}" maxlength="20">
    </div>
    <div class="row" style="margin-top: 1rem;">
        <button type="submit" class="btn btn-green">Uložit</button>
        <a href="{{ url_for('admin.branches') }}" class="btn btn-gray" style="margin-left: 0.5rem;">Zrušit</a>
    </div>
</form>
{% endblock %}
