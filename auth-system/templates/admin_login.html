{% extends "base.html" %}
{% block content %}
<h1>Přihlášení (pouze admin)</h1>
<form method="post" style="max-width: 320px;">
    <div class="row">
        <label for="username">Uživatelské jméno</label>
        <input type="text" id="username" name="username" required autofocus>
    </div>
    <div class="row">
        <label for="pin">PIN</label>
        <input type="password" id="pin" name="pin" inputmode="numeric" pattern="[0-9]*" minlength="4" maxlength="6" placeholder="4–6 číslic" required>
    </div>
    <button type="submit" class="btn btn-green" style="margin-top: 1rem;">Přihlásit</button>
</form>
{% endblock %}
