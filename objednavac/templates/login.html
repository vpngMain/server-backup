<!DOCTYPE html>
<html lang="cs" id="html-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
    (function(){var k='darkMode';var v=localStorage.getItem(k);if(v==='1')document.documentElement.classList.add('dark-mode');})();
    </script>
</head>
<body class="login-page">
    <main class="login-box">
        <h1>Přihlášení</h1>
        <p class="sub">Objednávač</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flash">
            {% for category, msg in messages %}
            <li class="flash-{{ category }}">{{ msg }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}
        <form method="post" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Uživatelské jméno</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="pin">PIN</label>
                <input type="password" id="pin" name="pin" inputmode="numeric" pattern="[0-9]*" minlength="4" maxlength="6" placeholder="4–6 číslic" required>
            </div>
            <button type="submit" class="btn btn-primary">Přihlásit</button>
        </form>
        <div class="theme-toggle-wrap">
            <button type="button" id="dark-mode-toggle" class="theme-toggle" aria-label="Přepnout režim">
                <span id="theme-icon">🌙</span>
                <span id="theme-label">Tmavý režim</span>
            </button>
        </div>
    </main>
    <script>
    (function() {
        var key = 'darkMode';
        var html = document.documentElement;
        var btn = document.getElementById('dark-mode-toggle');
        var icon = document.getElementById('theme-icon');
        var label = document.getElementById('theme-label');
        function apply(v) {
            if (v === '1') {
                html.classList.add('dark-mode');
                if (icon) icon.textContent = '☀';
                if (label) label.textContent = 'Světlý režim';
            } else {
                html.classList.remove('dark-mode');
                if (icon) icon.textContent = '🌙';
                if (label) label.textContent = 'Tmavý režim';
            }
        }
        apply(localStorage.getItem(key) || '0');
        if (btn) btn.addEventListener('click', function() {
            var next = html.classList.contains('dark-mode') ? '0' : '1';
            localStorage.setItem(key, next);
            apply(next);
        });
    })();
    </script>
</body>
</html>
