[pytest]
# pytest-asyncio: explicitní scope event loop (odstraní deprecation warning)
asyncio_default_fixture_loop_scope = function
# Potlačit DeprecationWarning z SQLAlchemy (utcnow v jejich schema.py – opraví až oni)
filterwarnings =
    ignore:datetime.datetime.utcnow.*:DeprecationWarning:sqlalchemy.*
