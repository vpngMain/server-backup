<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2d5a3d">
  <title>Blooms – Offline</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0);
      --safe-bottom: env(safe-area-inset-bottom, 0);
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
      background: linear-gradient(180deg, #e8f0eb 0%, #f8fbf9 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #21382a;
    }
    .box {
      width: min(560px, 100%);
      background: #fff;
      border: 1px solid rgba(45, 90, 61, 0.16);
      border-radius: 16px;
      padding: 18px 16px;
      box-shadow: 0 8px 24px rgba(45, 90, 61, 0.08);
    }
    h1 { margin: 0 0 10px; font-size: 1.25rem; }
    p { margin: 0 0 8px; line-height: 1.45; }
    .muted { color: #5e6e64; font-size: 0.95rem; }
    a {
      display: inline-flex;
      margin-top: 8px;
      min-height: 44px;
      align-items: center;
      padding: 0 14px;
      border-radius: 10px;
      background: #2d5a3d;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Jste offline</h1>
    <p>Aplikace Blooms je dočasně bez připojení.</p>
    <p class="muted">Jakmile bude internet dostupný, stránku obnovte a pokračujte v práci.</p>
    <a href="/dashboard">Zkusit znovu</a>
  </div>
</body>
</html>
