<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2d5a3d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Přihlášení – Blooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="login-page bg-light d-flex align-items-center min-vh-100">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-10 col-md-5 col-lg-4">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="card-title text-success mb-4">Blooms</h2>
                        <p class="text-muted small">Interní systém zahradnictví</p>
                        {% if error == 'empty' %}
                        <div class="alert alert-warning">Vyplňte uživatelské jméno a heslo.</div>
                        {% elif error == 'invalid' %}
                        <div class="alert alert-danger">Nesprávné přihlašovací údaje.</div>
                        {% endif %}
                        <form method="post" action="{{ url_for('auth.login') }}" autocomplete="on">
                            {% include '_csrf.html' %}
                            <div class="mb-3">
                                <label for="username" class="form-label">Uživatelské jméno</label>
                                <input type="text" class="form-control" id="username" name="username" required autofocus autocomplete="username">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Heslo</label>
                                <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
                            </div>
                            <button type="submit" class="btn btn-success w-100">Přihlásit</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
