{% extends "base.html" %}
{% block title %}Reset hesla{% endblock %}
{% block body %}
<div class="auth-page">
  <a href="/" class="auth-back">← Zpět na úvod</a>
  <div class="auth-box">
    <h1>Nastavit nové heslo</h1>
    <p class="text-muted" style="font-size:0.875rem;margin-bottom:1rem">Zadejte nové heslo pro váš účet.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" class="auth-form">
      <input type="hidden" name="token" value="{{ token or '' }}">
      <label>E-mail</label>
      <input type="text" value="{{ email or '' }}" disabled class="input" style="background:var(--gray-100)">
      <label>Nové heslo (min. 6 znaků)</label>
      <input type="password" name="password" required minlength="6" placeholder="Zadejte heslo">
      <label>Heslo znovu</label>
      <input type="password" name="password2" required minlength="6" placeholder="Zadejte heslo znovu">
      <button type="submit" class="btn btn-primary btn-block">Nastavit heslo a přihlásit se</button>
    </form>
    <p class="auth-foot"><a href="{{ url_for('login') }}">Už máte účet? Přihlaste se</a></p>
  </div>
</div>
<script>
  document.querySelector("form").addEventListener("submit", function(e) {
    const p1 = document.querySelector('input[name="password"]').value;
    const p2 = document.querySelector('input[name="password2"]').value;
    if (p1 !== p2) {
      e.preventDefault();
      const err = document.querySelector(".error") || document.createElement("p");
      err.className = "error";
      err.textContent = "Hesla se neshodují.";
      const form = document.querySelector(".auth-form");
      if (!document.querySelector(".error")) form.parentNode.insertBefore(err, form);
      else document.querySelector(".error").textContent = "Hesla se neshodují.";
    }
  });
</script>
{% endblock %}
