{% extends "base.html" %}
{% block content %}
<header class="navbar">
    <div class="navbar-brand">
        <h1 class="navbar-title">Směros</h1>
        <span class="navbar-subtitle">Přihlášení</span>
    </div>
</header>
<main class="main">
    <div class="login-box" style="max-width: 360px; margin: 2rem auto;">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flash-list" style="list-style:none; padding:0; margin:0 0 1rem 0;">
            {% for category, msg in messages %}
            <li class="flash-{{ category }}" style="padding: 0.75rem; margin-bottom: 0.5rem; border-radius: 8px; background: {% if category == 'error' %}rgba(239,68,68,0.2){% elif category == 'success' %}rgba(34,197,94,0.2){% else %}rgba(59,130,246,0.2){% endif %}; color: var(--text);">{{ msg }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}
        <form method="post" action="{{ url_for('login') }}">
            <div class="form-row" style="margin-bottom: 1rem;">
                <label for="username">Uživatelské jméno</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-row" style="margin-bottom: 1.25rem;">
                <label for="pin">PIN</label>
                <input type="password" id="pin" name="pin" inputmode="numeric" pattern="[0-9]*" minlength="4" maxlength="6" required placeholder="4–6 číslic">
            </div>
            <button type="submit" class="card-btn" style="width:100%; cursor: pointer;">Přihlásit</button>
        </form>
    </div>
</main>
{% endblock %}
