{% extends "base.html" %}

{% block content %}
<header class="navbar">
    <div class="navbar-brand">
        <h1 class="navbar-title">Směros</h1>
        <span class="navbar-subtitle">Service Router</span>
    </div>
    <div class="navbar-server">
        Server: <span id="hostname">{{ request.host.split(':')[0] }}</span>
    </div>
</header>

<main class="main">
    <div class="apps-grid">
        {% for app in apps %}
        <article class="card">
            <div class="card-icon" aria-hidden="true">{{ app.icon }}</div>
            <h2 class="card-title">{{ app.name }}</h2>
            <p class="card-description">{{ app.description }}</p>
            <button type="button" class="card-btn" data-port="{{ app.port }}" onclick="openApp({{ app.port }})">
                Otevřít
            </button>
        </article>
        {% endfor %}
    </div>
</main>
{% endblock %}
